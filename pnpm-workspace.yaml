packages:
  - 'packages/*'

# node-pty needs its postinstall (chmods spawn-helper +x); pnpm skips build
# scripts by default, which leaves it silently non-functional on fresh installs.
# electron/esbuild need their postinstall too (electron downloads its binary;
# without this the desktop app's `electron` runtime is missing). @electron/rebuild
# recompiles node-pty against Electron's ABI during packaging.
onlyBuiltDependencies:
  - node-pty
  - electron
  - esbuild
  - '@electron/rebuild'

# Force a modern node-gyp everywhere. electron-builder's bundled
# @electron/rebuild pulls node-gyp@9.4.1, whose Visual Studio detection can't
# parse recent VS2022 (17.10+) on the windows-latest runner ("Could not find
# any Visual Studio installation to use"), so the node-pty rebuild fails.
# node-gyp@10 fixed VS2022 detection. Global override so the transitive copy
# under electron-builder → @electron/rebuild picks it up too.
overrides:
  node-gyp: ^10.2.0
