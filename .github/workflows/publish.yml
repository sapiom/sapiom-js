name: Publish

# Publishes to npm via OIDC Trusted Publishing — no long-lived NPM_TOKEN.
#
# Prerequisites (one-time):
#   - A Trusted Publisher configured PER PACKAGE on npmjs.com, pointing at
#     repo `sapiom/sapiom-js` + workflow file `.github/workflows/publish.yml`.
#     A mismatch (repo/workflow/env) is the usual cause of a publish E404.
#   - Toolchain: Node > 22 and npm >= 11.5 (OIDC support) + a pnpm that supports
#     trusted publishing (pnpm 10+). `packageManager` in package.json must match.
#   - `id-token: write` (below) lets the runner mint the short-lived OIDC token.
#
# npm generates provenance attestations automatically under trusted publishing
# (no --provenance flag needed). `changeset publish` runs through pnpm so it
# resolves `workspace:*` to real ranges and only publishes versions not already
# on npm — so this is a safe no-op on pushes that aren't a version-PR merge.
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: mint the short-lived token npm trades for publish auth

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # pnpm version comes from package.json `packageManager` (pnpm 10+ for OIDC).
        # Keep all workflows in sync with it.

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Ensure npm >= 11.5 (OIDC trusted publishing)
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish to npm (OIDC trusted publishing — no token)
        id: publish
        run: |
          # Stream output live AND capture it. `set +e` + PIPESTATUS so a failing
          # `changeset publish` doesn't kill the step before we've logged its
          # output and recorded the real exit code — the old `OUTPUT=$(... 2>&1)`
          # form died at the assignment under `set -e`, hiding the actual error
          # (e.g. an E404 from a package with no trusted publisher configured).
          set +e
          pnpm changeset publish 2>&1 | tee publish-output.txt
          STATUS=${PIPESTATUS[0]}
          set -e
          if grep -q "@sapiom/mcp@" publish-output.txt; then
            echo "mcp-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "mcp-changed=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::changeset publish failed (exit $STATUS) — see output above. A common cause is a new package missing its per-package Trusted Publisher on npmjs.com (E404)."
            exit "$STATUS"
          fi

      # --- MCP registry publish (unchanged; already OIDC via github-oidc) ---
      - name: Sync MCP server.json version
        if: steps.publish.outputs.mcp-changed == 'true'
        working-directory: packages/mcp
        run: |
          VERSION=$(node -p "require('./package.json').version")
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        if: steps.publish.outputs.mcp-changed == 'true'
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        if: steps.publish.outputs.mcp-changed == 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish MCP server to registry
        if: steps.publish.outputs.mcp-changed == 'true'
        working-directory: packages/mcp
        run: ../../mcp-publisher publish
